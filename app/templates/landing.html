<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CookieOps — Find Your Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .tagline {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 0.5rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.875rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.875rem;
      font-family: inherit;
      color: #0f172a;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.12s, box-shadow 0.12s;
      margin-bottom: 0.75rem;
    }

    input[type="text"]:focus {
      border-color: #14b8a6;
      box-shadow: 0 0 0 3px rgba(20,184,166,0.1);
      background: #fff;
    }

    .hint {
      font-size: 0.72rem;
      color: #94a3b8;
      text-align: left;
      margin-top: -0.4rem;
      margin-bottom: 1.25rem;
    }

    button {
      width: 100%;
      padding: 0.625rem;
      background: #14b8a6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s;
    }

    button:hover { background: #0d9488; }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 0.625rem 0.875rem;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      text-align: left;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">CookieOps</div>
  <div class="tagline">Operations platform</div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="get" action="/t/">
    <label for="slug">Workspace name</label>
    <input
      type="text"
      id="slug"
      name="slug"
      placeholder="e.g. chai-and-biscuit"
      required
      autofocus
    >
    <div class="hint">Your workspace name is provided by your admin.</div>
    <button type="submit">Continue</button>
  </form>
</div>
</body>
</html>
