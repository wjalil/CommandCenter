<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CookieOps{% endblock %}</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --accent:          #14b8a6;
      --accent-hover:    #0d9488;
      --accent-soft:     rgba(20,184,166,0.10);
      --surface:         #ffffff;
      --bg:              #f1f5f9;
      --text-primary:    #0f172a;
      --text-secondary:  #64748b;
      --text-muted:      #94a3b8;
      --border:          #e2e8f0;
      --radius:          10px;
      --shadow-sm:       0 1px 2px rgba(0,0,0,0.05);
      --shadow:          0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:       0 4px 12px rgba(0,0,0,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 0.875rem;
      line-height: 1.6;
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    /* ── Top Nav ─────────────────────────────────── */
    .co-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow-sm);
    }

    .co-nav .brand {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .co-nav .brand .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    .co-nav .nav-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ── Page wrapper ────────────────────────────── */
    .co-page {
      padding: 1.75rem 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Bootstrap overrides ─────────────────────── */

    /* Buttons */
    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      font-weight: 500;
      border-radius: var(--radius);
      padding: 0.4rem 0.875rem;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover, .btn-primary:focus {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #fff;
    }

    .btn-outline-primary {
      color: var(--accent);
      border-color: var(--accent);
    }
    .btn-outline-primary:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-outline-secondary {
      color: var(--text-secondary);
      border-color: var(--border);
      background: var(--surface);
    }
    .btn-outline-secondary:hover {
      background: var(--bg);
      border-color: #cbd5e1;
      color: var(--text-primary);
    }

    .btn-sm {
      font-size: 0.75rem;
      padding: 0.3rem 0.65rem;
      border-radius: 8px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .card-header {
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.8125rem;
      color: var(--text-primary);
      padding: 0.75rem 1rem;
    }

    .card-body {
      padding: 1rem;
    }

    .card-footer {
      background: #f8fafc;
      border-top: 1px solid var(--border);
      padding: 0.625rem 1rem;
    }

    .shadow-sm { box-shadow: var(--shadow) !important; }

    /* Tables */
    .table {
      font-size: 0.8125rem;
      color: var(--text-primary);
    }

    .table th {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      border-bottom-color: var(--border);
      background: #f8fafc;
      padding: 0.625rem 0.875rem;
    }

    .table td {
      padding: 0.625rem 0.875rem;
      border-bottom-color: var(--border);
      vertical-align: middle;
    }

    .table-striped > tbody > tr:nth-of-type(odd) > * {
      background-color: #fafbfc;
    }

    table.nice-table {
      background: var(--surface);
      border-collapse: collapse;
      width: 100%;
      font-size: 0.8125rem;
    }

    table.nice-table th {
      background: #f8fafc;
      color: var(--text-secondary);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.625rem 0.875rem;
      border-bottom: 1px solid var(--border);
    }

    table.nice-table td {
      background: var(--surface);
      padding: 0.625rem 0.875rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    table.nice-table tr:last-child td { border-bottom: none; }
    table.nice-table tr:hover td { background: #f8fafc; }

    /* Forms */
    .form-control, .form-select {
      font-size: 0.8125rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      background: var(--surface);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      padding: 0.4rem 0.75rem;
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(20,184,166,0.15);
      outline: none;
    }

    .form-control-sm, .form-select-sm {
      font-size: 0.75rem;
      padding: 0.275rem 0.6rem;
      border-radius: 8px;
    }

    .form-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.35rem;
    }

    /* Alerts */
    .alert {
      border-radius: var(--radius);
      font-size: 0.8125rem;
      border-width: 1px;
      padding: 0.75rem 1rem;
    }

    .alert-success {
      background: rgba(20,184,166,0.08);
      border-color: rgba(20,184,166,0.25);
      color: #0d7a6d;
    }

    .alert-danger {
      background: rgba(239,68,68,0.07);
      border-color: rgba(239,68,68,0.2);
      color: #b91c1c;
    }

    .alert-warning {
      background: rgba(245,158,11,0.08);
      border-color: rgba(245,158,11,0.25);
      color: #92400e;
    }

    .alert-info {
      background: rgba(59,130,246,0.07);
      border-color: rgba(59,130,246,0.2);
      color: #1e40af;
    }

    /* Badges */
    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      border-radius: 999px;
      padding: 0.25em 0.6em;
    }

    .bg-primary   { background: var(--accent) !important; }
    .bg-success   { background: #10b981 !important; }
    .bg-warning   { background: #f59e0b !important; }
    .bg-danger    { background: #ef4444 !important; }
    .bg-secondary { background: #64748b !important; }

    /* List groups */
    .list-group-item {
      border-color: var(--border);
      font-size: 0.8125rem;
      padding: 0.75rem 1rem;
    }

    /* Modals */
    .modal-content {
      border-radius: var(--radius);
      border-color: var(--border);
      box-shadow: var(--shadow-md);
    }

    .modal-header {
      border-bottom-color: var(--border);
      padding: 1rem 1.25rem;
    }

    .modal-footer {
      border-top-color: var(--border);
      padding: 0.75rem 1.25rem;
    }

    /* Text helpers */
    .text-muted { color: var(--text-muted) !important; }
    .text-secondary { color: var(--text-secondary) !important; }
    .text-primary { color: var(--accent) !important; }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    h2 { font-size: 1.375rem; }
    h4 { font-size: 1.05rem; }
    h5 { font-size: 0.9rem; }

  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- Top Nav -->
  <header class="co-nav">
    <a href="/home" class="brand">
      <span class="dot"></span>
      CookieOps
    </a>
    <nav class="nav-actions">
      {% block nav_extra %}{% endblock %}
      <a href="/home" class="btn btn-sm btn-outline-secondary">Home</a>
      <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
    </nav>
  </header>

  <!-- Main content -->
  <main class="co-page">
    {% block content %}{% endblock %}
  </main>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Lucide icons init -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });
  </script>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('orderCart', () => ({
        cart: [],
        note: '',
        get total() {
          return this.cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
        },
        addToCart(id, name, price, qty) {
          qty = parseInt(qty);
          if (!qty || qty <= 0) return;
          const existing = this.cart.find(i => i.id === id);
          if (existing) {
            existing.quantity += qty;
          } else {
            this.cart.push({ id, name, price: parseFloat(price), quantity: qty });
          }
        },
        removeFromCart(index) {
          this.cart.splice(index, 1);
        },
        prepareForm(event) {
          if (this.cart.length === 0) {
            event.preventDefault();
            alert("Your cart is empty!");
          }
        }
      }));
    });
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
