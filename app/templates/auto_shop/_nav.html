{# Auto Shop navigation — include at the top of every auto_shop admin page #}
<nav class="navbar navbar-expand navbar-light bg-light mb-3 rounded">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/auto_shop/admin/">🔧 Auto Shop</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item">
        <a class="nav-link {% if active == 'dashboard' %}fw-bold text-primary{% endif %}"
           href="/auto_shop/admin/">Dashboard</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active == 'jobs' %}fw-bold text-primary{% endif %}"
           href="/auto_shop/admin/jobs">All Jobs</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active == 'new' %}fw-bold text-primary{% endif %}"
           href="/auto_shop/admin/jobs/new">+ New Job</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active == 'financials' %}fw-bold text-primary{% endif %}"
           href="/auto_shop/admin/financials">Financials</a>
      </li>
      {% if request.session.get("role") == "office_admin" %}
      <li class="nav-item ms-2">
        <a class="nav-link fw-semibold text-success" href="/worker/home">⏱ My Portal</a>
      </li>
      {% endif %}
    </ul>
  </div>
</nav>
